name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: GetTechAPI/TechAPI
          path: TechAPI

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Type check (mypy)
        run: mypy app

      - name: Validate seed data
        env:
          TECHAPI_DATA_DIR: ${{ github.workspace }}/TechAPI/data
        run: python -m app.validate

      - name: Tests + coverage (fail under 60%)
        env:
          TECHAPI_DATA_DIR: ${{ github.workspace }}/TechAPI/data
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=60
